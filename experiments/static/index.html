<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电磁学实验工作台</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="app">
  <aside>
    <h1>电磁学实验工作台</h1>
    <div id="moduleNav"></div>
    <h2>记录与高级控制</h2>
    <a href="/records.html" style="color:#9ee5eb;text-decoration:none;display:block;margin-bottom:8px">打开实验记录</a>
    <a href="/panel.html" style="color:#9ee5eb;text-decoration:none">打开仪器控制面板</a>
  </aside>
  <main>
    <div class="topbar">
      <div><h1 id="moduleTitle">加载中</h1><div class="hint" id="moduleGoal"></div></div>
      <div class="status"><span class="dot" id="dot-awg"></span><span id="awg-status">AWG 写通道</span><span class="dot" id="dot-scope"></span><span id="scope-status">Scope</span><button class="small" onclick="refreshStatus()">刷新</button></div>
    </div>
    <div class="workspace">
      <section class="band">
        <div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>本实验器材</b><span class="hint" id="materialHint"></span></div>
        <div class="material-grid" id="experimentMaterials"></div>
      </section>
      <section class="band" id="instrumentSetup">
        <div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>仪器预设</b><span class="hint">应用预设和抓取屏幕分开执行</span></div>
        <div class="setup-grid">
          <div class="setup-card"><h3>激励源 AWG</h3><div id="awgSetup"></div></div>
          <div class="setup-card"><h3>示波器 Scope</h3><div id="scopeSetup"></div></div>
          <div class="setup-apply"><button class="primary" onclick="applyInstrumentSetup()">应用仪器预设</button><button onclick="scopeAutoset()">Scope Auto</button><button onclick="captureAwgScreen()">抓 AWG 屏幕</button><button onclick="captureScopeScreen()">抓 Scope 屏幕</button><button onclick="captureInstrumentScreens()">抓取仪器屏幕</button><button class="danger" onclick="stopAWG()">关闭 AWG</button></div>
        </div>
        <div class="screen-grid" id="screenGrid">
          <div class="screen-box"><b>AWG 屏幕</b><div class="screen-frame hint" id="awgScreen">抓取后显示</div></div>
          <div class="screen-box"><b>Scope 屏幕</b><div class="screen-frame hint" id="scopeScreen">抓取后显示</div></div>
        </div>
      </section>
      <section class="band">
        <div class="controls" id="controlGrid">
          <div class="field"><label>器材</label><select id="profileSelect" onchange="selectProfile(this.value)"></select></div>
          <div id="stationFields" style="display:contents"></div>
          <div class="actions wide"><button class="primary" id="primaryAction" onclick="runPrimary()">运行/采样</button><button onclick="readWaveform()">读一帧</button><button onclick="recordManual()">记录此点</button></div>
        </div>
      </section>
      <section class="metrics" id="metrics"></section>
      <section class="graphrow">
        <div class="band"><div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>原始波形</b><span class="hint" id="waveInfo">等待采样</span></div><canvas id="waveCanvas"></canvas></div>
        <div class="band"><div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>拟合 / 理论对比</b><span class="hint" id="fitInfo">记录后显示</span></div><canvas id="fitCanvas"></canvas></div>
      </section>
    </div>
  </main>
  <section class="side">
    <h2 id="sideTitle">实验设计</h2>
    <div class="schematic" id="schematic"></div>
    <h3>实验目标</h3><div class="hint" id="stationGoal"></div>
    <h3>电路设计</h3><ol class="steps" id="circuit"></ol>
    <h3>采集参数设定</h3><div id="acquisition" class="hint"></div>
    <h3>采集控制</h3><ol class="steps" id="steps"></ol>
    <h3>安全提示</h3><div id="safety"></div>
  </section>
</div>
<div class="toast" id="toast"></div>
<script src="/workbench.js"></script>
</body>
</html>
