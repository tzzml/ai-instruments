<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电磁学实验工作台</title>
<style>
:root{--bg:#f4f6f8;--panel:#fff;--ink:#17212b;--mut:#637083;--line:#d8dee6;--teal:#087f8c;--red:#c2413a;--green:#2f855a;--amber:#b7791f;--graph:#101820}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 -apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif}
button,input,select{font:inherit}button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:6px;padding:7px 11px;cursor:pointer}button:hover{border-color:var(--teal);color:var(--teal)}button.primary{background:var(--teal);border-color:var(--teal);color:#fff}button.danger{border-color:var(--red);color:var(--red)}button.small{padding:4px 8px;font-size:12px}
input,select{border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:6px 8px;min-width:0}label{color:var(--mut);font-size:12px}
.app{display:grid;grid-template-columns:280px minmax(440px,1fr) 350px;min-height:100vh}
aside{background:#24313d;color:#dce4ec;padding:14px;border-right:1px solid #16202a;overflow:auto}aside h1{font-size:18px;margin:4px 0 14px}aside h2{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9fb1c3;margin:18px 0 8px}
.topic{margin:10px 0 4px;color:#fff;font-weight:700}.topic small{display:block;color:#aebdca;font-weight:400}.childNav button{display:block;width:100%;text-align:left;background:transparent;border:0;color:#cdd8e3;border-radius:6px;padding:7px 9px;margin:2px 0}.childNav button.active,.childNav button:hover{background:#314454;color:#fff}
main{padding:16px;overflow:auto}.topbar{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:12px}.topbar h1{font-size:21px;margin:0}.status{display:flex;gap:8px;align-items:center;color:var(--mut);font-size:12px}.dot{width:9px;height:9px;border-radius:50%;background:#999;display:inline-block}.dot.on{background:var(--green)}.dot.off{background:var(--red)}
.workspace{display:grid;gap:12px}.band{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.hint{color:var(--mut);font-size:12px}
.material-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.material-card{border:1px solid var(--line);border-radius:8px;padding:9px;background:#fbfcfd;cursor:pointer;min-height:82px}.material-card.active{border-color:var(--teal);box-shadow:0 0 0 1px rgba(8,127,140,.15);background:#f1fbfc}.material-card b{display:block;font-size:13px;margin-bottom:4px}.material-card span{display:block;color:var(--mut);font-size:12px}
.setup-grid{display:grid;grid-template-columns:1fr 1fr 170px;gap:10px;align-items:stretch}.setup-card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fbfcfd}.setup-card h3{font-size:13px;margin:0 0 8px;color:var(--teal)}.setup-line{display:flex;justify-content:space-between;gap:10px;border-top:1px solid #edf1f5;padding:5px 0;font-size:12px}.setup-line:first-of-type{border-top:0}.setup-line span{color:var(--mut)}.setup-apply{display:flex;flex-direction:column;justify-content:center;gap:8px}
.screen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.screen-box{border:1px solid var(--line);border-radius:8px;background:#fbfcfd;padding:8px}.screen-frame{display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;width:100%;min-height:150px;border-radius:5px;background:#111;overflow:hidden}.screen-frame img{display:block;width:100%;height:100%;object-fit:contain;background:#111}.screen-box b{display:block;margin-bottom:6px;font-size:12px}
.controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;align-items:end}.controls .wide{grid-column:span 2}.field{display:flex;flex-direction:column;gap:4px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.metric{border:1px solid var(--line);border-radius:8px;padding:9px;background:#fbfcfd}.metric span{display:block;color:var(--mut);font-size:12px}.metric b{display:block;font-size:18px;margin-top:2px}
.graphrow{display:grid;grid-template-columns:1.3fr .9fr;gap:12px}canvas{width:100%;height:320px;background:var(--graph);border:1px solid #243447;border-radius:6px;display:block}#fitCanvas{background:#fff}
.side{background:#fff;border-left:1px solid var(--line);padding:14px;overflow:auto}.side h2{font-size:16px;margin:0 0 10px}.side h3{font-size:13px;margin:16px 0 8px;color:var(--teal)}.schematic{border:1px solid var(--line);border-radius:8px;background:#fbfcfd;min-height:250px;padding:8px}.steps{margin:0;padding-left:18px}.steps li{margin:8px 0}.warn{border-left:3px solid var(--amber);background:#fff8eb;padding:8px 10px;border-radius:4px;color:#6f4a12}
.toast{position:fixed;right:14px;bottom:14px;background:#17212b;color:#fff;border-radius:8px;padding:10px 13px;max-width:360px;opacity:0;transform:translateY(8px);transition:.18s;z-index:5}.toast.show{opacity:1;transform:translateY(0)}.toast.err{background:#8b2f2a}.toast.ok{background:#276749}
@media(max-width:1100px){.app{grid-template-columns:230px 1fr}.side{grid-column:1/3;border-left:0;border-top:1px solid var(--line)}.graphrow,.setup-grid,.screen-grid{grid-template-columns:1fr}.controls{grid-template-columns:repeat(2,minmax(0,1fr))}.material-grid{grid-template-columns:1fr}}
@media(max-width:760px){.app{display:block}.controls{grid-template-columns:1fr}.controls .wide{grid-column:auto}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>电磁学实验工作台</h1>
    <div id="moduleNav" class="childNav"></div>
    <h2>记录与高级控制</h2>
    <a href="/records.html" style="color:#9ee5eb;text-decoration:none;display:block;margin-bottom:8px">打开实验记录</a>
    <a href="/panel.html" style="color:#9ee5eb;text-decoration:none">打开仪器控制面板</a>
  </aside>
  <main>
    <div class="topbar">
      <div><h1 id="moduleTitle">加载中</h1><div class="hint" id="moduleGoal"></div></div>
      <div class="status"><span class="dot" id="dot-awg"></span><span id="awg-status">AWG 写通道</span><span class="dot" id="dot-scope"></span><span id="scope-status">Scope</span><button class="small" onclick="refreshStatus()">刷新</button></div>
    </div>
    <div class="workspace">
      <section class="band">
        <div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>本实验器材</b><span class="hint" id="materialHint"></span></div>
        <div class="material-grid" id="experimentMaterials"></div>
      </section>
      <section class="band" id="instrumentSetup">
        <div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>仪器预设</b><span class="hint">应用预设和抓取屏幕分开执行</span></div>
        <div class="setup-grid">
          <div class="setup-card"><h3>激励源 AWG</h3><div id="awgSetup"></div></div>
          <div class="setup-card"><h3>示波器 Scope</h3><div id="scopeSetup"></div></div>
          <div class="setup-apply"><button class="primary" onclick="applyInstrumentSetup()">应用仪器预设</button><button onclick="captureInstrumentScreens()">抓取仪器屏幕</button><button class="danger" onclick="stopAWG()">关闭 AWG</button></div>
        </div>
        <div class="screen-grid" id="screenGrid">
          <div class="screen-box"><b>AWG 屏幕</b><div class="screen-frame hint" id="awgScreen">抓取后显示</div></div>
          <div class="screen-box"><b>Scope 屏幕</b><div class="screen-frame hint" id="scopeScreen">抓取后显示</div></div>
        </div>
      </section>
      <section class="band">
        <div class="controls" id="controlGrid">
          <div class="field"><label>器材</label><select id="profileSelect" onchange="selectProfile(this.value)"></select></div>
          <div id="stationFields" style="display:contents"></div>
          <div class="actions wide"><button class="primary" id="primaryAction" onclick="runPrimary()">运行/采样</button><button onclick="readWaveform()">读一帧</button><button onclick="recordManual()">记录此点</button></div>
        </div>
      </section>
      <section class="metrics" id="metrics"></section>
      <section class="graphrow">
        <div class="band"><div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>原始波形</b><span class="hint" id="waveInfo">等待采样</span></div><canvas id="waveCanvas"></canvas></div>
        <div class="band"><div class="actions" style="justify-content:space-between;margin-bottom:8px"><b>拟合 / 理论对比</b><span class="hint" id="fitInfo">记录后显示</span></div><canvas id="fitCanvas"></canvas></div>
      </section>
    </div>
  </main>
  <section class="side">
    <h2 id="sideTitle">实验设计</h2>
    <div class="schematic" id="schematic"></div>
    <h3>实验目标</h3><div class="hint" id="stationGoal"></div>
    <h3>电路设计</h3><ol class="steps" id="circuit"></ol>
    <h3>采集参数设定</h3><div id="acquisition" class="hint"></div>
    <h3>采集控制</h3><ol class="steps" id="steps"></ol>
    <h3>安全提示</h3><div id="safety"></div>
  </section>
</div>
<div class="toast" id="toast"></div>
<script>
var modules=[], stations=[], profiles=[], currentStation=null, currentProfile=null, records=loadRecords();
var expLabels={rc_filter:'RC 采样',q_sweep:'扫频测 Q',ringdown:'ring-down',coupling_point:'耦合采样',transformer_point:'变压器采样',mw_receiver_alignment:'标准场强接收',tdr_capture:'TDR 捕获',diode_va:'二极管伏安',rectifier_scope:'半波整流',am_detector:'AM 包络检波'};
var primaryLabels={rc_filter:'记录 RC 点',q_sweep:'运行扫频',ringdown:'采集 ring-down',coupling_point:'记录耦合点',transformer_point:'记录变压器点',mw_receiver_alignment:'记录接收点',tdr_capture:'采集 TDR',diode_va:'运行伏安曲线',rectifier_scope:'记录整流波形',am_detector:'记录检波波形'};
function $(id){return document.getElementById(id)}
function parseSI(s){s=(''+s).trim();if(!s)return null;var m={G:1e9,M:1e6,K:1e3,k:1e3,m:1e-3,u:1e-6,U:1e-6,n:1e-9,p:1e-12};var last=s[s.length-1];return last in m?parseFloat(s.slice(0,-1))*m[last]:parseFloat(s)}
function fmt(v,u){if(v===undefined||v===null||Number.isNaN(v))return '-';if(u==='Hz'){if(Math.abs(v)>=1e6)return (v/1e6).toFixed(3)+' MHz';if(Math.abs(v)>=1e3)return (v/1e3).toFixed(2)+' kHz';return v.toFixed(2)+' Hz'}if(u==='s'){if(Math.abs(v)<1e-6)return (v*1e9).toFixed(2)+' ns';if(Math.abs(v)<1e-3)return (v*1e6).toFixed(2)+' us';return v.toFixed(4)+' s'}if(u==='m')return v.toFixed(3)+' m';return typeof v==='number'?v.toFixed(4):v}
function toast(msg,kind){var t=$('toast');t.textContent=msg;t.className='toast show '+(kind||'');clearTimeout(t._x);t._x=setTimeout(function(){t.className='toast'},2600)}
function api(path,body){return fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}).then(function(r){return r.json()})}
function getJSON(path){return fetch(path).then(function(r){return r.json()})}
function profileByKey(k){return profiles.find(function(p){return p.key===k})}
function stationMaterialProfiles(){return (currentStation.materials||[]).map(profileByKey).filter(Boolean)}
function init(){getJSON('/api/experiments/profiles').then(function(d){profiles=d.raw.profiles;modules=d.raw.modules;stations=d.raw.stations;currentStation=stations[0];currentProfile=stationMaterialProfiles()[0];renderAll();refreshStatus();drawEmpty();}).catch(function(e){toast('加载实验配置失败: '+e.message,'err')})}
function renderAll(){renderNav();renderProfiles();renderSelectors();syncStation()}
function renderNav(){
  var nav=$('moduleNav');nav.innerHTML='';
  modules.forEach(function(m){
    var kids=stations.filter(function(s){return s.parent_key===m.key}); if(!kids.length)return;
    var head=document.createElement('div');head.className='topic';head.innerHTML=m.title+'<small>'+m.goal+'</small>';nav.appendChild(head);
    var group=document.createElement('div');group.className='childNav';
    kids.forEach(function(s){var b=document.createElement('button');b.textContent=s.title;b.onclick=function(){currentStation=s;currentProfile=stationMaterialProfiles()[0];renderAll()};if(currentStation&&currentStation.key===s.key)b.className='active';group.appendChild(b)});
    nav.appendChild(group);
  });
  $('moduleTitle').textContent=currentStation.title;$('moduleGoal').textContent=currentStation.goal;
}
function renderProfiles(){var list=stationMaterialProfiles();$('experimentMaterials').innerHTML='';list.forEach(function(p){var d=document.createElement('div');d.className='material-card '+(currentProfile&&currentProfile.key===p.key?'active':'');d.innerHTML='<b>'+p.name+'</b><span>'+p.summary+'</span>';d.onclick=function(){selectProfile(p.key)};$('experimentMaterials').appendChild(d)});$('materialHint').textContent=list.length>1?'选择本次接入的器材':'本实验固定使用这组器材'}
function renderSelectors(){var ps=stationMaterialProfiles();$('profileSelect').innerHTML=ps.map(function(p){return '<option value="'+p.key+'">'+p.name+'</option>'}).join('');if(currentProfile)$('profileSelect').value=currentProfile.key;renderStationFields()}
function selectProfile(key){currentProfile=profileByKey(key)||stationMaterialProfiles()[0];$('profileSelect').value=currentProfile.key;applyStationDefaults();renderProfiles();syncStation()}
function renderStationFields(){var box=$('stationFields');box.innerHTML='';(currentStation.parameters||[]).forEach(function(p){box.appendChild(makeField(p))});applyStationDefaults();$('primaryAction').textContent=primaryLabels[currentStation.experiment]||'运行/采样'}
function makeField(p){var d=document.createElement('div');d.className='field';var lab=document.createElement('label');lab.textContent=p.label+(p.unit?' '+p.unit:'');d.appendChild(lab);var el;if(p.type==='select'){el=document.createElement('select');(p.options||[]).forEach(function(o){var opt=document.createElement('option');opt.value=o[0];opt.textContent=o[1];el.appendChild(opt)})}else{el=document.createElement('input');el.placeholder=p.unit||''}el.id='param_'+p.id;el.dataset.param=p.id;el.value=p.default||'';el.oninput=function(){renderInstrumentSetup();renderSchematic()};el.onchange=function(){renderInstrumentSetup();renderSchematic()};d.appendChild(el);return d}
function applyStationDefaults(){var r=(currentProfile&&currentProfile.recommended)||{};(currentStation.parameters||[]).forEach(function(p){var el=$('param_'+p.id);if(!el)return;var v=p.default||'';if(p.id==='f_start'&&r.frequency_start_hz)v=r.frequency_start_hz;if(p.id==='f_stop'&&r.frequency_stop_hz)v=r.frequency_stop_hz;if(p.id==='amplitude_vpp'&&r.awg_amp_vpp)v=r.awg_amp_vpp;if(p.id==='scope_vdiv'&&r.scope_vdiv)v=r.scope_vdiv;if(p.id==='distance_cm'&&r.distance_m)v=r.distance_m*100;if(p.id==='velocity_factor'&&r.velocity_factor)v=r.velocity_factor;el.value=v})}
function syncStation(){$('sideTitle').textContent=currentStation.title;$('stationGoal').textContent=currentStation.goal;renderSchematic();renderCircuit();renderAcquisition();renderInstrumentSetup();renderControls();renderSafety();drawFit()}
function renderCircuit(){$('circuit').innerHTML=(currentStation.circuit||[]).map(function(s){return '<li>'+s+'</li>'}).join('')}
function renderAcquisition(){var a=currentStation.acquisition||{};$('acquisition').innerHTML='<b>AWG</b><br>'+compactPlain(a.awg||{})+'<br><br><b>Scope</b><br>'+compactPlain(a.scope||{})+'<br><br><b>测量量</b><br>'+((a.measure||[]).join(' / '))}
function requestBody(){var body={station:currentStation.key,profile:currentProfile&&currentProfile.key,experiment:currentStation.experiment};Array.prototype.forEach.call(document.querySelectorAll('[data-param]'),function(el){var id=el.dataset.param,raw=el.value;if(id==='core')body[id]=raw==='true';else if(el.tagName==='SELECT'||['open','short','matched','sine','square','capacitor','resistor'].indexOf(raw)>=0||raw.indexOf('_')>=0)body[id]=raw;else body[id]=parseSI(raw)});if(body.capacitance_pf)body.capacitance_f=body.capacitance_pf*1e-12;if(body.scope_tdiv_s)body.tdiv=body.scope_tdiv_s;return body}
function instrumentPreset(){var body=requestBody(),a=currentStation.acquisition||{},awg=Object.assign({},a.awg||{}),sc=Object.assign({},a.scope||{});if(body.waveform)awg.wave=body.waveform;if(body.frequency_hz)awg.frequency_hz=body.frequency_hz;else if(body.f_start)awg.frequency_hz=body.f_start;if(body.carrier_hz)awg.carrier_hz=body.carrier_hz;if(body.mod_freq_hz)awg.mod_freq_hz=body.mod_freq_hz;if(body.mod_depth_pct)awg.mod_depth_pct=body.mod_depth_pct;if(body.period_s){awg.period_s=body.period_s;sc.tdiv=body.period_s/10}if(body.v_scan){awg.amp_vpp=body.v_scan*2;awg.offset_v=0;awg.ramp_symmetry=50}if(body.awg_freq)awg.frequency_hz=body.awg_freq;if(body.amplitude_vpp)awg.amp_vpp=body.amplitude_vpp;if(body.awg_amp)awg.amp_vpp=body.awg_amp;if(body.scope_vdiv)sc.vdiv=body.scope_vdiv;if(body.vdiv)sc.vdiv=body.vdiv;if(body.scope_tdiv_s)sc.tdiv=body.scope_tdiv_s;if(body.trigger_level)sc.trig_level=body.trigger_level;return{awg:awg,scope:sc}}
function renderInstrumentSetup(){var p=instrumentPreset();$('awgSetup').innerHTML=setupLines(p.awg);$('scopeSetup').innerHTML=setupLines(p.scope)}
function setupLines(o){return Object.keys(o||{}).map(function(k){return '<div class="setup-line"><span>'+k+'</span><b>'+o[k]+'</b></div>'}).join('')||'<div class="hint">本实验不自动配置该仪器</div>'}
function applyInstrumentSetup(){var p=instrumentPreset(),awg=p.awg||{},sc=p.scope||{},jobs=[];if(awg.source==='avalanche_pulser'){toast('外部雪崩脉冲源不由 AWG 配置','')}else if(Object.keys(awg).length){if(awg.modulation==='AM'){jobs.push(api('/api/awg/configure-am',{channel:1,carrier_hz:Number(awg.carrier_hz||awg.frequency_hz),amp:Number(awg.amp_vpp),mod_freq_hz:Number(awg.mod_freq_hz),mod_depth_pct:Number(awg.mod_depth_pct),load:Number(awg.load_ohm||10000)}))}else{var awgBody={channel:1};if(awg.wave)awgBody.wave=String(awg.wave).split('/')[0];if(awg.frequency_hz)awgBody.freq=Number(awg.frequency_hz);if(awg.period_s)awgBody.period=Number(awg.period_s);if(awg.amp_vpp)awgBody.amp=Number(awg.amp_vpp);if(awg.offset_v!==undefined)awgBody.offset=Number(awg.offset_v);if(awg.load_ohm)awgBody.load=Number(awg.load_ohm);if(awg.duty_pct)awgBody.duty=Number(awg.duty_pct);if(awg.ramp_symmetry)awgBody.ramp_symmetry=Number(awg.ramp_symmetry);awgBody.output=true;jobs.push(api('/api/awg/configure',awgBody))}}var channels=sc.channels||[sc.channel||1];channels.forEach(function(ch){var scopeBody={channel:Number(ch),on:true};if(sc.vdiv)scopeBody.vdiv=Number(sc.vdiv);if(sc.coupling)scopeBody.coupling=sc.coupling;if(sc.tdiv)scopeBody.tdiv=Number(sc.tdiv);if(sc.mode)scopeBody.acquire_mode=sc.mode;if(sc.trig_level)scopeBody.trig_level=Number(sc.trig_level);jobs.push(api('/api/scope/config',scopeBody))});Promise.all(jobs).then(function(){toast('仪器预设已应用，可按需抓取屏幕','ok');refreshStatus()}).catch(function(e){toast('应用仪器预设失败: '+e.message,'err')})}
function captureInstrumentScreens(){setShot('awgScreen','/api/awg/screenshot');setShot('scopeScreen','/api/scope/screenshot')}
function setShot(id,url){var box=$(id);box.innerHTML='正在抓屏...';var img=new Image();img.onload=function(){box.innerHTML='';box.appendChild(img)};img.onerror=function(){box.textContent='抓屏失败或仪器未连接'};img.src=url+'?_='+Date.now()}
function runPrimary(){var e=currentStation.experiment,body=requestBody();var path=e==='q_sweep'||e==='mw_receiver_alignment'?'/api/exp/q-sweep':e==='ringdown'?'/api/exp/ringdown':e==='coupling_point'?'/api/exp/coupling-point':e==='transformer_point'?'/api/exp/transformer-point':e==='tdr_capture'?'/api/exp/tdr-capture':e==='diode_va'?'/api/exp/diode-va':null;if(!path){recordManual();return}toast('采集中...');api(path,body).then(function(d){handleResult(e,d)}).catch(function(err){toast('采样失败: '+err.message,'err')})}
function handleResult(exp,d){if(d.ok===false){toast((d.warnings&&d.warnings[0])||d.error||'实验失败','err');return}if(d.valid===false)toast((d.warnings&&d.warnings[0])||'结果无效，请调整范围','err');else toast('采样完成','ok');var m=d.metrics||{};if(exp==='q_sweep'||exp==='mw_receiver_alignment')metricHTML([['f0',fmt(m.f0,'Hz')],['Q',fmt(m.q)],['带宽',fmt(m.bandwidth,'Hz')],['峰值',fmt(m.peak_vrms)]]);else if(exp==='ringdown')metricHTML([['f0',fmt(m.f0,'Hz')],['Q',fmt(m.q)],['tau',fmt(m.tau_d,'s')],['方法','时域']]);else if(exp==='tdr_capture')metricHTML([['Δt',fmt(m.delta_t_s,'s')],['长度',fmt(m.length_m,'m')],['速度',fmt(m.velocity_m_s)],['反射比',fmt(m.reflection_ratio)]]);else if(exp==='diode_va')metricHTML([['采样电阻',fmt(m.rsense)+' Ω'],['扫描周期',fmt(m.period_s,'s')],['曲线','I-V'],['单位','mA']]);else metricHTML([['增益',fmt(m.gain||m.voltage_ratio)],['参考',fmt(m.ref_vrms||m.primary_vrms)],['接收/副边',fmt(m.rx_vrms||m.secondary_vrms)],['铁芯',m.core?'插入':'取出']]);drawFromResult(exp,d);addRecord(exp,d)}
function readWaveform(){var sc=(instrumentPreset().scope||{}),channels=sc.channels||[sc.channel||1];getJSON('/api/scope/waveforms?ch='+channels.join(',')+'&points=1800').then(function(d){drawWaveforms(d.channels||{});$('waveInfo').textContent='已读 '+Object.keys(d.channels||{}).join(', ')}).catch(function(e){toast('读波形失败: '+e.message,'err')})}
function stopAWG(){api('/api/awg/off',{channel:1}).then(function(){toast('AWG 已关闭','ok')}).catch(function(e){toast(e.message,'err')})}
function refreshStatus(){getJSON('/api/status').then(function(d){$('dot-awg').className='dot on';$('awg-status').textContent='AWG '+d.awg.id;$('dot-scope').className='dot '+(d.scope.online?'on':'off');$('scope-status').textContent=d.scope.online?'Scope 在线':'Scope 离线'})}
function recordManual(){addRecord(currentStation.experiment,{valid:true,metrics:requestBody(),warnings:[],raw:{},fit:{}});toast('已记录，完整列表见实验记录页','ok')}
function addRecord(exp,d){var row={time:new Date().toLocaleString(),module:currentStation.title,profile:currentProfile.name,experiment:expLabels[exp]||exp,params:requestBody(),metrics:d.metrics||{},valid:d.valid!==false,warnings:d.warnings||[]};records.push(row);saveRecords();drawFit()}
function loadRecords(){try{return JSON.parse(localStorage.getItem('em_lab_records')||'[]')}catch(e){return[]}}
function saveRecords(){localStorage.setItem('em_lab_records',JSON.stringify(records))}
function compactPlain(o){return Object.keys(o||{}).map(function(k){return k+': '+o[k]}).join('<br>')||'按实验默认设置'}
function metricHTML(items){$('metrics').innerHTML=items.map(function(it){return '<div class="metric"><span>'+it[0]+'</span><b>'+it[1]+'</b></div>'}).join('')}
function renderControls(){$('steps').innerHTML=(currentStation.controls||[]).map(function(s){return '<li>'+s+'</li>'}).join('')}
function renderSafety(){var tips=(currentProfile&&currentProfile.safety)||['先低幅度起步，随时可关闭 AWG。'];$('safety').innerHTML=tips.map(function(t){return '<div class="warn">'+t+'</div>'}).join('')}
function renderSchematic(){var k=currentStation.key,core=(($('param_core')||{}).value)==='true';var title=currentStation.title;function box(x,y,w,h,t,c){return '<rect class="diagram-box" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="8" fill="'+c+'" stroke="#8aa0b2"/><text x="'+(x+10)+'" y="'+(y+22)+'" font-size="13" fill="#17212b">'+t+'</text>'}function line(x1,y1,x2,y2,t){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#334" stroke-width="2" marker-end="url(#arrow)"/>'+(t?'<text x="'+((x1+x2)/2-20)+'" y="'+((y1+y2)/2-6)+'" font-size="11" fill="#637083">'+t+'</text>':'')}function diode(x,y){return '<path d="M'+x+' '+y+' l24 14 l-24 14 z" fill="#fff" stroke="#334" stroke-width="2"/><line x1="'+(x+27)+'" y1="'+(y-2)+'" x2="'+(x+27)+'" y2="'+(y+30)+'" stroke="#334" stroke-width="2"/>'}var s='<svg viewBox="0 0 330 230" width="100%" height="230"><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#334"/></marker></defs>';if(k.indexOf('rc_')===0){s+=box(12,25,78,48,'AWG CH1','#e9fbfc')+line(90,49,135,49,'R')+box(135,25,74,48,'RC 节点','#fff8eb')+line(172,73,172,128,'C')+box(230,25,82,48,'Scope CH2','#eef6ff')+line(209,49,230,49)+box(230,118,82,48,'Scope CH1','#eef6ff')+line(52,73,230,142,'参考')}else if(k.indexOf('mw_')===0){if(k==='mw_standard_field')s+=box(10,35,92,52,'标准测试环','#e9fbfc')+line(102,61,210,61,'约一米场强')+box(210,35,100,52,'收音机/环形天线','#fff8eb')+box(210,130,100,52,'Scope 输出','#eef6ff');else s+=box(10,35,82,52,'AWG 弱耦合','#e9fbfc')+line(92,61,140,61)+box(140,28,86,68,'LC 回路','#fff8eb')+line(226,61,285,61)+box(245,130,70,52,'Scope CH1','#eef6ff')}else if(k.indexOf('coil_')===0){s+=box(10,38,82,52,'AWG 原边','#e9fbfc')+line(92,64,135,64)+'<ellipse cx="162" cy="92" rx="34" ry="58" fill="none" stroke="#087f8c" stroke-width="4"/><ellipse cx="220" cy="92" rx="24" ry="42" fill="none" stroke="#5b5fc7" stroke-width="4"/>'+(core?'<rect x="145" y="48" width="90" height="88" fill="#d8a642" opacity=".35"/>':'')+box(245,38,75,52,'Scope CH2','#eef6ff')+line(220,64,245,64)}else if(k.indexOf('antenna_')===0){s+=box(10,45,88,52,'发射偶极子','#e9fbfc')+line(98,71,214,71,'距离/角度')+box(214,45,96,52,'接收天线','#fff8eb')+box(214,135,96,52,'Scope CH2','#eef6ff')}else if(k==='diode_va_curve'){s+=box(10,35,82,52,'AWG ramp','#e9fbfc')+line(92,61,125,61)+diode(128,46)+line(158,61,205,61,'Rs')+box(205,35,78,52,'R_sense','#fff8eb')+box(18,130,82,52,'Scope CH1','#eef6ff')+line(55,87,55,130,'V_AWG')+box(210,130,82,52,'Scope CH2','#eef6ff')+line(244,87,244,130,'I*R')}else if(k==='diode_half_wave_rectifier'){s+=box(10,42,82,52,'AWG sine','#e9fbfc')+line(92,68,124,68)+diode(127,53)+line(158,68,208,68,'R/C')+box(208,42,86,52,'负载+电容','#fff8eb')+box(208,132,86,52,'Scope CH2','#eef6ff')+line(250,94,250,132,'输出')+box(12,132,82,52,'Scope CH1','#eef6ff')+line(50,94,50,132,'输入')}else if(k==='diode_am_detector'){s+=box(10,42,82,52,'AWG AM','#e9fbfc')+line(92,68,124,68,'载波')+diode(127,53)+line(158,68,208,68,'包络')+box(208,42,86,52,'RC 检波','#fff8eb')+box(208,132,86,52,'Scope CH2','#eef6ff')+line(250,94,250,132,'音频')+box(12,132,82,52,'Scope CH1','#eef6ff')+line(50,94,50,132,'参考')}else{s+=box(10,45,92,52,'AWG 方波','#e9fbfc')+line(102,71,230,71,'长线/待测线')+box(230,45,82,52,'终端','#fff8eb')+box(120,135,92,52,'Scope CH1','#eef6ff')+line(150,97,166,135,'源端测量')}s+='<text x="12" y="214" font-size="12" fill="#637083">'+title+'</text></svg>';$('schematic').innerHTML=s}
function canvas(id){var c=$(id),d=window.devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;c.width=w*d;c.height=h*d;var x=c.getContext('2d');x.scale(d,d);return{x:x,w:w,h:h}}
function axes(p,title){var x=p.x,w=p.w,h=p.h;x.clearRect(0,0,w,h);x.fillStyle=title==='fit'?'#fff':'#101820';x.fillRect(0,0,w,h);x.strokeStyle=title==='fit'?'#c9d1da':'#304355';for(var i=40;i<w;i+=50){x.beginPath();x.moveTo(i,0);x.lineTo(i,h);x.stroke()}for(var j=35;j<h;j+=45){x.beginPath();x.moveTo(0,j);x.lineTo(w,j);x.stroke()}x.fillStyle=title==='fit'?'#17212b':'#dbe7ef';x.font='12px sans-serif';x.fillText(title==='fit'?'拟合/理论':'波形',12,18)}
function drawEmpty(){drawWaveforms({});drawFit()}
function drawWaveforms(channels){var p=canvas('waveCanvas');axes(p,'wave');var colors={1:'#6ee7f2',2:'#74d99f',3:'#e8c85a',4:'#b7a9ff'},keys=Object.keys(channels);if(!keys.length){p.x.fillStyle='#7f91a3';p.x.fillText('读一帧或运行实验后显示原始波形',20,55);return}keys.forEach(function(k){var ch=channels[k],t=ch.time||[],v=ch.voltage||[],n=Math.min(t.length,v.length);if(!n)return;var vmax=Math.max.apply(null,v),vmin=Math.min.apply(null,v),span=Math.max(Math.abs(vmax),Math.abs(vmin),1e-9);p.x.strokeStyle=colors[k]||'#fff';p.x.beginPath();for(var i=0;i<n;i++){var xx=30+i*(p.w-50)/(n-1),yy=p.h/2-v[i]*(p.h*.38)/span;if(i)p.x.lineTo(xx,yy);else p.x.moveTo(xx,yy)}p.x.stroke();p.x.fillStyle=colors[k]||'#fff';p.x.fillText('CH'+k+' Vpp '+fmt(ch.vpp),p.w-130,20+18*keys.indexOf(k))})}
function drawFromResult(exp,d){if(exp==='diode_va')drawDiodeVA(d);else if(d.raw&&d.raw.channels)drawWaveforms(d.raw.channels);else if(d.raw&&d.raw.time&&d.raw.voltage)drawWaveforms({1:{time:d.raw.time,voltage:d.raw.voltage,vpp:Math.max.apply(null,d.raw.voltage)-Math.min.apply(null,d.raw.voltage)}});else if(d.raw&&d.raw.time&&d.raw.ref)drawWaveforms({1:{time:d.raw.time,voltage:d.raw.ref},2:{time:d.raw.time,voltage:d.raw.rx||d.raw.secondary}});drawFit(exp,d)}
function drawFit(exp,d){var p=canvas('fitCanvas');axes(p,'fit');var x=p.x,w=p.w,h=p.h;if(exp==='diode_va'&&d&&d.raw&&d.raw.voltage){drawDiodeVA(d);return}if(d&&d.raw&&d.raw.sweep){var s=d.raw.sweep;if(!s.length)return;var f=s.map(function(a){return a.f}),v=s.map(function(a){return a.v}),f0=Math.min.apply(null,f),f1=Math.max.apply(null,f),vm=Math.max.apply(null,v)||1;x.strokeStyle='#087f8c';x.beginPath();s.forEach(function(pt,i){var xx=40+(pt.f-f0)/(f1-f0)*(w-65),yy=h-35-pt.v/vm*(h-70);if(i)x.lineTo(xx,yy);else x.moveTo(xx,yy)});x.stroke();x.fillStyle='#17212b';x.fillText('扫频响应: 峰值、-3dB 带宽、Q',20,45);return}x.fillStyle='#637083';x.fillText('运行实验或累计记录后显示拟合曲线',20,45)}
function drawDiodeVA(d){var p=canvas('fitCanvas');axes(p,'fit');var x=p.x,w=p.w,h=p.h,raw=(d&&d.raw)||{},v=raw.voltage||[],i=raw.current||[],n=Math.min(v.length,i.length);if(!n){x.fillStyle='#637083';x.fillText('运行伏安曲线后显示二极管 I-V',20,45);return}var vmin=Math.min.apply(null,v),vmax=Math.max.apply(null,v),imin=Math.min.apply(null,i),imax=Math.max.apply(null,i);if(vmax===vmin){vmax=vmin+1}if(imax===imin){imax=imin+1}x.strokeStyle='#d8dee6';var x0=40+(0-vmin)/(vmax-vmin)*(w-65),y0=h-35-(0-imin)/(imax-imin)*(h-70);x.beginPath();x.moveTo(40,y0);x.lineTo(w-25,y0);x.moveTo(x0,30);x.lineTo(x0,h-35);x.stroke();x.strokeStyle='#c2413a';x.beginPath();for(var k=0;k<n;k++){var xx=40+(v[k]-vmin)/(vmax-vmin)*(w-65),yy=h-35-(i[k]-imin)/(imax-imin)*(h-70);if(k)x.lineTo(xx,yy);else x.moveTo(xx,yy)}x.stroke();x.fillStyle='#17212b';x.fillText('二极管伏安曲线  V_D vs I_D',20,45);x.fillText('V_D: '+fmt(vmin)+' .. '+fmt(vmax)+' V',20,h-18);x.fillText('I_D: '+fmt(imin)+' .. '+fmt(imax)+' mA',w-170,h-18)}
window.addEventListener('resize',drawEmpty);init();
</script>
