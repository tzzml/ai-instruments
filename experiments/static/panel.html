<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪器控制面板 - UTG962 + SDS824X HD + UT61E</title>
<style>
:root{--bg:#0d1b2a;--card:#152233;--card2:#1b2a3a;--line:#243447;--fg:#e0e6ed;--mut:#8a99a8;--blue:#4fc3f7;--red:#e94560;--green:#50fa7b;--yellow:#f1fa8c;--purple:#bd93f9}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:13px/1.45 -apple-system,"PingFang SC",sans-serif;padding:12px}a{color:var(--blue);text-decoration:none}
button,input,select{font:inherit}button{background:var(--card2);border:1px solid var(--line);color:var(--fg);padding:7px 10px;border-radius:5px;cursor:pointer}button:hover{border-color:var(--blue);color:var(--blue)}button.primary{background:var(--blue);border-color:var(--blue);color:#001220;font-weight:700}button.danger{border-color:var(--red);color:var(--red)}button.warn{border-color:var(--yellow);color:var(--yellow)}
input,select{background:var(--card2);border:1px solid var(--line);border-radius:5px;color:var(--fg);padding:5px 7px;min-width:0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.top{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding-bottom:10px;border-bottom:1px solid var(--line)}h1{font-size:18px;margin:0 8px 0 0}.stat{display:flex;gap:6px;align-items:center;color:var(--mut)}.dot{width:10px;height:10px;border-radius:50%;background:#555}.dot.on{background:var(--green);box-shadow:0 0 7px var(--green)}.dot.off{background:var(--red)}.idn{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px}
.layout{display:grid;grid-template-columns:1fr 1.25fr;gap:12px;margin-top:12px}.section{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px}.section h2{margin:0 0 10px;font-size:15px;color:var(--blue);display:flex;justify-content:space-between;gap:10px}.hint{color:var(--mut);font-size:11px;line-height:1.5}.channel-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.scope-grid{grid-template-columns:repeat(4,minmax(180px,1fr))}
.channel-card{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:10px}.channel-card header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.channel-title{font-weight:700}.state{font-size:11px;color:var(--mut)}.state.on{color:var(--green)}.state.err{color:var(--red)}
.row{display:grid;grid-template-columns:58px minmax(0,1fr);gap:6px;align-items:center;margin:6px 0}.row label{color:var(--mut);font-size:12px}.row.two{grid-template-columns:58px 1fr 1fr}.btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.toggle{display:inline-flex;gap:5px;align-items:center;color:var(--mut)}.toggle input{min-width:auto}
.dmm-panel{display:grid;grid-template-columns:minmax(220px,1fr) minmax(220px,1fr);gap:10px}.dmm-readout{background:#050b12;border:1px solid var(--line);border-radius:6px;min-height:96px;display:flex;align-items:center;justify-content:center;font:700 28px/1 ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--green);text-align:center;padding:12px}.dmm-meta{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--mut);word-break:break-all}
.screens{display:grid;grid-template-columns:1fr 1fr;gap:10px}.screen-frame{aspect-ratio:16/9;background:#050b12;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--mut)}.screen-frame img{width:100%;height:100%;object-fit:contain}
.wave{margin-top:12px}.ctrl{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:8px}.chbox{display:inline-flex;gap:4px;align-items:center;cursor:pointer}.sw{width:10px;height:10px;border-radius:2px}canvas{width:100%;height:320px;background:#08111c;border:1px solid var(--line);border-radius:5px;display:block}
.toast{position:fixed;right:16px;bottom:16px;background:var(--card2);border:1px solid var(--line);padding:10px 14px;border-radius:7px;opacity:0;transition:.2s;max-width:360px;z-index:10}.toast.show{opacity:1}.toast.err{border-color:var(--red);color:var(--red)}.toast.ok{border-color:var(--green);color:var(--green)}
@media(max-width:1200px){.layout{grid-template-columns:1fr}.scope-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:720px){.channel-grid,.scope-grid,.screens,.dmm-panel{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top">
  <h1>仪器控制面板</h1>
  <div class="stat"><span class="dot" id="dot-awg"></span>AWG <span class="idn" id="idn-awg">write-only</span></div>
  <div class="stat"><span class="dot" id="dot-scope"></span>Scope <span class="idn" id="idn-scope">-</span></div>
  <div class="stat"><span class="dot" id="dot-dmm"></span>DMM <span class="idn" id="idn-dmm">UT61E</span></div>
  <div style="margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <button onclick="refreshPanelStatus()">刷新状态</button>
    <button onclick="captureAwgScreen()">抓 AWG 屏幕</button>
    <button onclick="captureScopeScreen()">抓 Scope 屏幕</button>
    <button onclick="captureScreens()">抓取仪器屏幕</button>
    <button class="danger" onclick="resetAll()">重置仪器</button>
    <a href="/">返回实验平台</a>
  </div>
</div>

<div class="layout">
  <section class="section">
    <h2>信号发生器 UTG962 <span class="hint">AWG 只写不查；状态为最近下发配置</span></h2>
    <div class="channel-grid" id="awgChannels"></div>
  </section>

  <section class="section">
    <h2>示波器 SDS824X HD <span class="hint">刷新状态读取仪器真实通道设置</span></h2>
    <div class="channel-grid scope-grid" id="scopeChannels"></div>
    <div class="btns">
      <button class="primary" onclick="scopeAutoset()">AUTO SET</button>
      <button onclick="scopeRun()">RUN</button>
      <button class="warn" onclick="scopeStop()">STOP</button>
      <button onclick="scopeSingle()">SINGLE</button>
    </div>
  </section>
</div>

<section class="section" style="margin-top:12px">
  <h2>万用表 UT61E <span class="hint">慢速/DC/基础元件读数，串口 19200 7O1</span></h2>
  <div class="dmm-panel">
    <div>
      <div class="row"><label>串口</label><input id="dmmPort" placeholder="/dev/tty.usbserial-xxxx 或留空用 UT61E_PORT"></div>
      <div class="btns"><button class="primary" onclick="dmmRead()">读一次</button><button onclick="refreshDmmStatus()">刷新 DMM 状态</button></div>
      <div class="hint" id="dmmHint" style="margin-top:8px">用于电阻、电压、二极管压降、电容等低速读数；高速过程仍由 Scope 采集。</div>
    </div>
    <div>
      <div class="dmm-readout" id="dmmReadout">未读取</div>
      <div class="dmm-meta" id="dmmMeta">-</div>
    </div>
  </div>
</section>

<section class="section" style="margin-top:12px">
  <h2>仪器屏幕截图 <span class="hint">截图独立执行，方便核对真实面板</span></h2>
  <div class="screens">
    <div><div class="hint" style="margin-bottom:6px">AWG 屏幕</div><div class="screen-frame" id="awgScreen">未抓取</div></div>
    <div><div class="hint" style="margin-bottom:6px">Scope 屏幕</div><div class="screen-frame" id="scopeScreen">未抓取</div></div>
  </div>
</section>

<section class="section wave">
  <div class="ctrl">
    <b style="color:var(--blue)">波形读取</b>
    <label class="chbox"><input type="checkbox" class="chsel" value="1" checked><span class="sw" style="background:#4fc3f7"></span>CH1</label>
    <label class="chbox"><input type="checkbox" class="chsel" value="2"><span class="sw" style="background:#50fa7b"></span>CH2</label>
    <label class="chbox"><input type="checkbox" class="chsel" value="3"><span class="sw" style="background:#f1fa8c"></span>CH3</label>
    <label class="chbox"><input type="checkbox" class="chsel" value="4"><span class="sw" style="background:#bd93f9"></span>CH4</label>
    <button onclick="refreshWave()">读一帧</button>
    <label class="toggle"><input type="checkbox" id="auto" onchange="toggleAuto()">自动刷新</label>
    <select id="rate"><option value="1000">1s</option><option value="500" selected>0.5s</option><option value="2000">2s</option></select>
    <span id="wave-info" class="hint" style="margin-left:auto"></span>
  </div>
  <canvas id="wave-canvas"></canvas>
</section>

<div class="toast" id="toast"></div>

<script>
var COLORS={1:'#4fc3f7',2:'#50fa7b',3:'#f1fa8c',4:'#bd93f9'};
var AWG_DEFAULTS=[{channel:1,wave:'sine',freq:1000,amp:2,offset:0,load:10000,output:false},{channel:2,wave:'sine',freq:1000,amp:2,offset:0,load:10000,output:false}];
function $(id){return document.getElementById(id)}
function parseSI(s){if(typeof s==='number')return s;s=(''+s).trim();if(!s)return null;var m={G:1e9,M:1e6,K:1e3,k:1e3,m:1e-3,u:1e-6,U:1e-6,n:1e-9,p:1e-12};var last=s[s.length-1];return last in m?parseFloat(s.slice(0,-1))*m[last]:parseFloat(s)}
function fmt(v){return v===undefined||v===null||Number.isNaN(Number(v))?'-':Number(v).toPrecision(5)}
function toast(msg,kind){var t=$('toast');t.textContent=msg;t.className='toast show '+(kind||'');clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast'},2400)}
function api(path,body){return fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}).then(function(r){return r.json()}).then(function(d){if(d&&d.ok===false)throw new Error(d.error||'操作失败');return d})}
function getJSON(path){return fetch(path).then(function(r){return r.json()})}
function v(id){return $(id).value}

function renderAwgChannels(channels){
  channels=channels||AWG_DEFAULTS;
  $('awgChannels').innerHTML=channels.map(function(ch){
    var c=ch.channel;
    return '<div class="channel-card" data-awg="'+c+'"><header><span class="channel-title">CH'+c+'</span><span class="state '+(ch.output?'on':'')+'" id="awg_state_'+c+'">'+(ch.output?'输出 ON':'输出 OFF')+'</span></header>'+
      '<div class="row"><label>波形</label><select id="awg_wave_'+c+'"><option value="sine">sine</option><option value="square">square</option><option value="ramp">ramp</option><option value="pulse">pulse</option><option value="noise">noise</option><option value="dc">dc</option></select></div>'+
      '<div class="row"><label>频率</label><input id="awg_freq_'+c+'" value="'+(ch.freq||1000)+'"></div>'+
      '<div class="row"><label>幅度</label><input id="awg_amp_'+c+'" value="'+(ch.amp||2)+'"></div>'+
      '<div class="row"><label>偏置</label><input id="awg_offset_'+c+'" value="'+(ch.offset||0)+'"></div>'+
      '<div class="row"><label>负载</label><input id="awg_load_'+c+'" value="'+(ch.load||10000)+'"></div>'+
      '<div class="btns"><button class="primary" onclick="awgApply('+c+')">应用 CH'+c+'</button><button onclick="awgOutput('+c+',true)">输出开</button><button class="danger" onclick="awgOutput('+c+',false)">输出关</button></div></div>';
  }).join('');
  channels.forEach(function(ch){var el=$('awg_wave_'+ch.channel);if(el&&ch.wave)el.value=ch.wave});
}

function renderScopeChannels(channels){
  channels=channels||[1,2,3,4].map(function(c){return{channel:c}});
  $('scopeChannels').innerHTML=channels.map(function(ch){
    var c=ch.channel, state=ch.error?'err':(ch.on?'on':'');
    return '<div class="channel-card" data-scope="'+c+'"><header><span class="channel-title">CH'+c+'</span><span class="state '+state+'" id="scope_state_'+c+'">'+(ch.error?'查询失败':(ch.on?'显示 ON':'显示 OFF'))+'</span></header>'+
      '<div class="row"><label>开启</label><label class="toggle"><input type="checkbox" id="sc_on_'+c+'" '+(ch.on?'checked':'')+'>显示通道</label></div>'+
      '<div class="row"><label>V/div</label><input id="sc_vdiv_'+c+'" value="'+(ch.scale||0.5)+'"></div>'+
      '<div class="row"><label>偏置</label><input id="sc_offset_'+c+'" value="'+(ch.offset||0)+'"></div>'+
      '<div class="row"><label>耦合</label><select id="sc_coupling_'+c+'"><option>DC</option><option>AC</option><option>GND</option></select></div>'+
      '<div class="row"><label>探头</label><input id="sc_probe_'+c+'" value="'+(ch.probe||1)+'"></div>'+
      '<div class="btns"><button class="primary" onclick="scopeConfig('+c+')">应用 CH'+c+'</button><button onclick="scopeTrigger('+c+')">设为触发源</button></div></div>';
  }).join('');
  channels.forEach(function(ch){var el=$('sc_coupling_'+ch.channel);if(el&&ch.coupling)el.value=String(ch.coupling).toUpperCase()});
}

function refreshPanelStatus(){
  getJSON('/api/panel/status').then(function(d){
    var awg=d.awg||{}, sc=d.scope||{}, dm=d.dmm||{};
    $('dot-awg').className='dot '+(awg.online?'on':'off');$('idn-awg').textContent=(awg.id||'write-only')+' / '+(awg.state_source||'');
    $('dot-scope').className='dot '+(sc.online?'on':'off');$('idn-scope').textContent=sc.online?(sc.id||'在线'):(sc.error||'离线');
    renderDmmStatus(dm);
    renderAwgChannels(awg.channels);renderScopeChannels(sc.channels);
    toast('状态已刷新','ok');
  }).catch(function(e){toast('状态刷新失败: '+e.message,'err')});
}

function renderDmmStatus(dm){
  dm=dm||{};
  $('dot-dmm').className='dot '+(dm.online?'on':(dm.configured?'':'off'));
  $('idn-dmm').textContent=dm.port||'UT61E 未配置串口';
  if(dm.port&&!v('dmmPort'))$('dmmPort').value=dm.port;
  var candidates=(dm.candidates||[]).join(' ');
  $('dmmHint').textContent=dm.note||('候选串口: '+(candidates||'未发现'));
}

function refreshDmmStatus(){
  var port=v('dmmPort');
  getJSON('/api/dmm/status'+(port?'?port='+encodeURIComponent(port):'')).then(function(d){
    renderDmmStatus(d.dmm||{});
    toast('DMM 状态已刷新','ok');
  }).catch(function(e){toast('DMM 状态失败: '+e.message,'err')});
}

function dmmRead(){
  var port=v('dmmPort').trim();
  $('dmmReadout').textContent='读取中...';
  api('/api/dmm/read',{port:port||null,timeout:2}).then(function(d){
    var r=d.reading||{};
    $('dot-dmm').className='dot on';
    $('idn-dmm').textContent=port||'UT61E';
    $('dmmReadout').textContent=r.display||'-';
    $('dmmMeta').textContent=[r.mode,r.dc?'DC':'',r.ac?'AC':'',r.auto?'AUTO':'',r.hold?'HOLD':'',r.low_battery?'LOW BAT':''].filter(Boolean).join(' / ')||'-';
    toast('DMM 读数完成','ok');
  }).catch(function(e){
    $('dot-dmm').className='dot off';
    $('dmmReadout').textContent='读取失败';
    $('dmmMeta').textContent=e.message;
    toast('DMM 读取失败: '+e.message,'err');
  });
}

function awgBody(ch){var body={channel:ch,wave:v('awg_wave_'+ch)};var fields={freq:'freq',amp:'amp',offset:'offset',load:'load'};Object.keys(fields).forEach(function(k){var n=parseSI(v('awg_'+k+'_'+ch));if(n!=null)body[fields[k]]=n});return body}
function awgApply(ch){api('/api/awg/configure',awgBody(ch)).then(function(){toast('AWG CH'+ch+' 已应用','ok');refreshPanelStatus()}).catch(function(e){toast(e.message,'err')})}
function awgOutput(ch,on){api('/api/awg/output',{channel:ch,on:on}).then(function(){toast('AWG CH'+ch+(on?' 输出开':' 输出关'),'ok');refreshPanelStatus()}).catch(function(e){toast(e.message,'err')})}

function scopeConfig(ch){var body={channel:ch,on:$('sc_on_'+ch).checked,coupling:v('sc_coupling_'+ch)};var vd=parseSI(v('sc_vdiv_'+ch));if(vd!=null)body.vdiv=vd;var off=parseSI(v('sc_offset_'+ch));if(off!=null)body.offset=off;var pr=parseSI(v('sc_probe_'+ch));if(pr!=null)body.probe=pr;api('/api/scope/config',body).then(function(){toast('Scope CH'+ch+' 已应用','ok');refreshPanelStatus()}).catch(function(e){toast(e.message,'err')})}
function scopeTrigger(ch){var level=parseSI(prompt('触发电平 V', '0'));if(level===null||Number.isNaN(level))return;api('/api/scope/config',{channel:ch,trig_level:level,trig_slope:'POS'}).then(function(){toast('触发源已设为 CH'+ch,'ok')}).catch(function(e){toast(e.message,'err')})}
function scopeRun(){api('/api/scope/run',{}).then(function(){toast('Scope RUN','ok')}).catch(function(e){toast(e.message,'err')})}
function scopeStop(){api('/api/scope/stop',{}).then(function(){toast('Scope STOP','ok')}).catch(function(e){toast(e.message,'err')})}
function scopeSingle(){api('/api/scope/single',{channel:1,level:0,slope:'POS',timeout:5}).then(function(d){toast(d.triggered?'已捕获':'未触发',d.triggered?'ok':'err');if(d.triggered)refreshWave()}).catch(function(e){toast(e.message,'err')})}
function scopeAutoset(){toast('Scope 正在自动设置...');api('/api/scope/autoset',{}).then(function(){toast('Scope Auto 已执行，可按需单独抓屏','ok');refreshPanelStatus()}).catch(function(e){toast(e.message,'err')})}

function captureAwgScreen(){return setShot('awgScreen','/api/awg/screenshot','AWG')}
function captureScopeScreen(){return setShot('scopeScreen','/api/scope/screenshot','Scope')}
function captureScreens(){captureAwgScreen().then(captureScopeScreen)}
function setShot(id,url,name){var box=$(id);if(box.dataset.busy==='1'){toast((name||'仪器')+' 正在抓屏，请稍等','');return Promise.resolve(false)}box.dataset.busy='1';box.textContent='抓取中...';var img=new Image();var slow=setTimeout(function(){if(box.dataset.busy==='1')box.textContent='仍在读取 '+(name||'仪器')+' 屏幕，USB 截图可能需要几十秒'},12000);return new Promise(function(resolve){img.onload=function(){clearTimeout(slow);box.dataset.busy='0';box.innerHTML='';box.appendChild(img);resolve(true)};img.onerror=function(){clearTimeout(slow);box.dataset.busy='0';box.textContent='抓取失败';resolve(false)};img.src=url+'?_='+Date.now()})}
function resetAll(){if(!confirm('确认重置 AWG 和示波器？'))return;api('/api/reset',{}).then(function(){toast('已重置','ok');refreshPanelStatus();refreshWave()}).catch(function(e){toast(e.message,'err')})}

function drawWave(chData){var c=$('wave-canvas'),W=c.clientWidth,H=320,d=window.devicePixelRatio||1;c.width=W*d;c.height=H*d;var x=c.getContext('2d');x.scale(d,d);x.fillStyle='#08111c';x.fillRect(0,0,W,H);x.strokeStyle='#15293d';for(var gx=50;gx<W;gx+=45){x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke()}for(var gy=30;gy<H;gy+=40){x.beginPath();x.moveTo(0,gy);x.lineTo(W,gy);x.stroke()}var keys=Object.keys(chData||{});if(!keys.length){x.fillStyle='#8a99a8';x.fillText('勾选通道并点击读一帧',20,35);return}var vmin=Infinity,vmax=-Infinity;keys.forEach(function(k){(chData[k].voltage||[]).forEach(function(v){vmin=Math.min(vmin,v);vmax=Math.max(vmax,v)})});if(vmax<=vmin){vmax=vmin+1}var first=chData[keys[0]].time||[0,1],t0=first[0],t1=first[first.length-1]||1;keys.forEach(function(k){var t=chData[k].time||[],v=chData[k].voltage||[];x.strokeStyle=COLORS[k]||'#fff';x.beginPath();for(var i=0;i<Math.min(t.length,v.length);i++){var px=45+(W-60)*(t[i]-t0)/(t1-t0||1),py=20+(H-45)*(1-(v[i]-vmin)/(vmax-vmin));i?x.lineTo(px,py):x.moveTo(px,py)}x.stroke();x.fillStyle=COLORS[k]||'#fff';x.fillText('CH'+k,10,20+16*keys.indexOf(k))})}
function refreshWave(){var chs=[].slice.call(document.querySelectorAll('.chsel:checked')).map(function(c){return c.value});if(!chs.length){toast('请至少勾选一个通道','err');return}fetch('/api/scope/waveforms?ch='+chs.join(',')+'&points=1500').then(function(r){return r.json()}).then(function(d){var out={};Object.keys(d.channels||{}).forEach(function(k){out[k]={time:d.channels[k].time,voltage:d.channels[k].voltage}});drawWave(out);$('wave-info').textContent=Object.keys(d.channels||{}).map(function(k){var c=d.channels[k];return 'CH'+k+' '+c.vpp.toFixed(3)+' Vpp'}).join(' / ')}).catch(function(e){toast('读波形失败: '+e.message,'err')})}
var autoTimer=null;function toggleAuto(){if($('auto').checked){autoTimer=setInterval(refreshWave,Number(v('rate')));refreshWave()}else{clearInterval(autoTimer);autoTimer=null}}$('rate').onchange=function(){if(autoTimer){clearInterval(autoTimer);autoTimer=setInterval(refreshWave,Number(v('rate')))}};
renderAwgChannels(AWG_DEFAULTS);renderScopeChannels();refreshPanelStatus();setTimeout(refreshWave,500);window.addEventListener('resize',refreshWave);
</script>
</body>
</html>
